<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-shell :: layout('프로젝트 수정', 'projects', ~{::section})}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="text-secondary small">
            프로젝트 관리 / <span th:text="${project.name}">-</span> / 수정
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-outline-secondary" th:href="@{|/admin/projects/${project.id}|}">취소</a>
            <button class="btn btn-sm btn-dark" type="submit" form="projectEditForm">저장</button>
        </div>
    </div>

    <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

    <form id="projectEditForm" th:action="@{|/admin/projects/${project.id}|}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- 기본 정보 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">기본 정보</div>
                <div class="row g-3">
                    <div class="col-12 col-md-8">
                        <label class="form-label">프로젝트명 <span class="text-danger">*</span></label>
                        <input class="form-control" name="name" required th:value="${project.name}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">프로젝트 코드</label>
                        <input class="form-control" name="projectCode" th:value="${project.projectCode}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">거래처</label>
                        <select class="form-select" name="clientId">
                            <option value="">선택 안 함</option>
                            <option th:each="c : ${clients}"
                                    th:value="${c.id}"
                                    th:text="${c.name}"
                                    th:selected="${project.clientId != null and project.clientId == c.id}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">상태</label>
                        <select class="form-select" name="status">
                            <option value="ESTIMATE"    th:selected="${project.status == 'ESTIMATE'}">견적</option>
                            <option value="CONTRACT"    th:selected="${project.status == 'CONTRACT'}">계약</option>
                            <option value="IN_PROGRESS" th:selected="${project.status == 'IN_PROGRESS'}">진행중</option>
                            <option value="DONE"        th:selected="${project.status == 'DONE'}">완료</option>
                            <option value="CANCELLED"   th:selected="${project.status == 'CANCELLED'}">취소</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">최종승인일자</label>
                        <input class="form-control" type="date" name="approvedDate" th:value="${project.approvedDate}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">PM</label>
                        <select class="form-select" name="pmEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name + (emp.positionName != null ? ' (' + emp.positionName + ')' : '')}"
                                    th:selected="${project.pmEmpNo != null and project.pmEmpNo == emp.empNo}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">담당 임원</label>
                        <select class="form-select" name="executiveEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name + (emp.positionName != null ? ' (' + emp.positionName + ')' : '')}"
                                    th:selected="${project.executiveEmpNo != null and project.executiveEmpNo == emp.empNo}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">영업 담당</label>
                        <select class="form-select" name="salesEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name + (emp.positionName != null ? ' (' + emp.positionName + ')' : '')}"
                                    th:selected="${project.salesEmpNo != null and project.salesEmpNo == emp.empNo}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">사업장</label>
                        <input class="form-control" name="businessPlace" th:value="${project.businessPlace}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">대분류</label>
                        <input class="form-control" name="categoryMajor" th:value="${project.categoryMajor}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">중분류</label>
                        <input class="form-control" name="categoryMinor" th:value="${project.categoryMinor}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">수행 부서 (조직도)</label>
                        <select class="form-select" name="orgUnitId">
                            <option value="">선택 안 함</option>
                            <option th:each="ou : ${orgUnits}"
                                    th:value="${ou.id}"
                                    th:text="${ou.name}"
                                    th:selected="${project.orgUnitId != null and project.orgUnitId == ou.id}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">본부</label>
                        <input class="form-control" name="division" th:value="${project.division}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">부서</label>
                        <input class="form-control" name="department" th:value="${project.department}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">참여형태</label>
                        <input class="form-control" name="participationType" th:value="${project.participationType}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">수급형태</label>
                        <input class="form-control" name="supplyType" th:value="${project.supplyType}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">시작일</label>
                        <input class="form-control" type="date" name="startDate" th:value="${project.startDate}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">종료일</label>
                        <input class="form-control" type="date" name="endDate" th:value="${project.endDate}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">프로젝트 설명</label>
                        <textarea class="form-control" name="description" rows="3"
                                  th:text="${project.description}"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">메모</label>
                        <textarea class="form-control" name="memo" rows="2"
                                  th:text="${project.memo}"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 계약 일반 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">계약 일반</div>
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">고객명 (수요기관)</label>
                        <input class="form-control" name="customerAgency" th:value="${project.customerAgency}">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">발주처</label>
                        <input class="form-control" name="customerOrdering" th:value="${project.customerOrdering}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">계약명</label>
                        <input class="form-control" name="contractName" th:value="${project.contractName}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">계약일자</label>
                        <input class="form-control" type="date" name="contractDate" th:value="${project.contractDate}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">계약 시작일</label>
                        <input class="form-control" type="date" name="contractStart" th:value="${project.contractStart}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">계약 종료일</label>
                        <input class="form-control" type="date" name="contractEnd" th:value="${project.contractEnd}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">A/S 시작일</label>
                        <input class="form-control" type="date" name="asStart" th:value="${project.asStart}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">A/S 종료일</label>
                        <input class="form-control" type="date" name="asEnd" th:value="${project.asEnd}">
                    </div>

                    <!-- 금액 섹션 -->
                    <div class="col-12"><hr class="my-1"><div class="text-secondary small mb-1">금액 정보 (계약금액과 당사지분(%)만 입력하면 나머지는 자동 계산됩니다)</div></div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">계약금액 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="contractAmount" id="editContractAmount"
                                   min="0" step="10000" th:value="${project.contractAmount}"
                                   oninput="calcEditAmounts()">
                            <span class="input-group-text">원</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">당사지분 (%)</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="ourShareRate" id="editOurShareRate"
                                   min="0" max="100" step="1"
                                   th:value="${project.ourShareRate != null ? project.ourShareRate : 100}"
                                   oninput="calcEditAmounts()">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">계약금액(부가세제외) <span class="text-secondary small">(자동계산)</span></label>
                        <div class="input-group">
                            <input class="form-control bg-light" type="text" id="editContractAmountVatEx" readonly
                                   th:value="${project.contractAmountVatEx != null ? #numbers.formatInteger(project.contractAmountVatEx,0,'COMMA') : ''}">
                            <span class="input-group-text">원</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">당사계약금액 <span class="text-secondary small">(자동계산)</span></label>
                        <div class="input-group">
                            <input class="form-control bg-light" type="text" id="editOurAmount" readonly
                                   th:value="${project.ourAmount != null ? #numbers.formatInteger(project.ourAmount,0,'COMMA') : ''}">
                            <span class="input-group-text">원</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">당사계약금액(부가세제외) <span class="text-secondary small">(자동계산)</span></label>
                        <div class="input-group">
                            <input class="form-control bg-light" type="text" id="editOurAmountVatEx" readonly
                                   th:value="${project.ourAmountVatEx != null ? #numbers.formatInteger(project.ourAmountVatEx,0,'COMMA') : ''}">
                            <span class="input-group-text">원</span>
                        </div>
                    </div>

                    <div class="col-12"><hr class="my-1"></div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">결재조건</label>
                        <input class="form-control" name="paymentCondition" th:value="${project.paymentCondition}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">하자기간</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="defectPeriod" min="0"
                                   th:value="${project.defectPeriod}">
                            <span class="input-group-text">개월</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">지체상금률</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="penaltyRate" step="0.01" min="0"
                                   th:value="${project.penaltyRate}">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            ['pmEmpNo', 'executiveEmpNo', 'salesEmpNo'].forEach(function (name) {
                var el = document.querySelector('select[name="' + name + '"]');
                if (el) new TomSelect(el, { placeholder: '이름으로 검색', maxOptions: 100 });
            });
        });

        function calcEditAmounts() {
            var amt = parseFloat(document.getElementById('editContractAmount').value) || 0;
            var rate = parseFloat(document.getElementById('editOurShareRate').value) || 100;
            var vatEx = Math.round(amt / 1.1);
            var ourAmt = Math.round(amt * rate / 100);
            var ourVatEx = Math.round(ourAmt / 1.1);
            document.getElementById('editContractAmountVatEx').value = vatEx > 0 ? vatEx.toLocaleString('ko-KR') : '';
            document.getElementById('editOurAmount').value = ourAmt > 0 ? ourAmt.toLocaleString('ko-KR') : '';
            document.getElementById('editOurAmountVatEx').value = ourVatEx > 0 ? ourVatEx.toLocaleString('ko-KR') : '';
        }
    </script>
</section>
</html>
