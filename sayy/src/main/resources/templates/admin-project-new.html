<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-shell :: layout('프로젝트 등록', 'projects', ~{::section})}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="text-secondary small">프로젝트 관리 / 신규 등록</div>
        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-outline-secondary" href="/admin/projects">취소</a>
            <button class="btn btn-sm btn-dark" type="submit" form="projectForm">저장</button>
        </div>
    </div>

    <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

    <form id="projectForm" action="/admin/projects" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- 기본 정보 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">기본 정보</div>
                <div class="row g-3">
                    <div class="col-12 col-md-8">
                        <label class="form-label">프로젝트명 <span class="text-danger">*</span></label>
                        <input class="form-control" name="name" required placeholder="프로젝트명을 입력하세요">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">프로젝트 코드</label>
                        <input class="form-control" name="projectCode" placeholder="PRJ-2024-001">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">거래처</label>
                        <select class="form-select" name="clientId">
                            <option value="">선택 안 함</option>
                            <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">상태</label>
                        <select class="form-select" name="status">
                            <option value="ESTIMATE" selected>견적</option>
                            <option value="CONTRACT">계약</option>
                            <option value="IN_PROGRESS">진행중</option>
                            <option value="DONE">완료</option>
                            <option value="CANCELLED">취소</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">최종승인일자</label>
                        <input class="form-control" type="date" name="approvedDate">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">PM</label>
                        <select class="form-select" name="pmEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name + (emp.positionName != null ? ' (' + emp.positionName + ')' : '')}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">담당 임원</label>
                        <select class="form-select" name="executiveEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name + (emp.positionName != null ? ' (' + emp.positionName + ')' : '')}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">영업 담당</label>
                        <select class="form-select" name="salesEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name + (emp.positionName != null ? ' (' + emp.positionName + ')' : '')}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">사업장</label>
                        <input class="form-control" name="businessPlace">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">대분류</label>
                        <input class="form-control" name="categoryMajor">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">중분류</label>
                        <input class="form-control" name="categoryMinor">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">수행 부서 (조직도)</label>
                        <select class="form-select" name="orgUnitId">
                            <option value="">선택 안 함</option>
                            <option th:each="ou : ${orgUnits}" th:value="${ou.id}" th:text="${ou.name}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">본부</label>
                        <input class="form-control" name="division">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">부서</label>
                        <input class="form-control" name="department">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">참여형태</label>
                        <input class="form-control" name="participationType">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">수급형태</label>
                        <input class="form-control" name="supplyType">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">시작일</label>
                        <input class="form-control" type="date" name="startDate">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">종료일</label>
                        <input class="form-control" type="date" name="endDate">
                    </div>
                    <div class="col-12">
                        <label class="form-label">프로젝트 설명</label>
                        <textarea class="form-control" name="description" rows="3" placeholder="프로젝트 개요, 목표 등"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">메모</label>
                        <textarea class="form-control" name="memo" rows="2"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 계약 일반 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">계약 일반</div>
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">고객명 (수요기관)</label>
                        <input class="form-control" name="customerAgency">
                    </div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">발주처</label>
                        <input class="form-control" name="customerOrdering">
                    </div>
                    <div class="col-12">
                        <label class="form-label">계약명</label>
                        <input class="form-control" name="contractName">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">계약일자</label>
                        <input class="form-control" type="date" name="contractDate">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">계약 시작일</label>
                        <input class="form-control" type="date" name="contractStart">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">계약 종료일</label>
                        <input class="form-control" type="date" name="contractEnd">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">A/S 시작일</label>
                        <input class="form-control" type="date" name="asStart">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">A/S 종료일</label>
                        <input class="form-control" type="date" name="asEnd">
                    </div>

                    <!-- 금액 -->
                    <div class="col-12"><hr class="my-1"><div class="text-secondary small mb-1">금액 정보 (계약금액과 당사지분(%)만 입력하면 나머지는 자동 계산됩니다)</div></div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">계약금액</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="contractAmount" id="newContractAmount"
                                   min="0" step="10000" oninput="calcNewAmounts()">
                            <span class="input-group-text">원</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">당사지분 (%)</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="ourShareRate" id="newOurShareRate"
                                   min="0" max="100" step="1" value="100" oninput="calcNewAmounts()">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">계약금액(부가세제외) <span class="text-secondary small">(자동계산)</span></label>
                        <div class="input-group">
                            <input class="form-control bg-light" type="text" id="newContractAmountVatEx" readonly>
                            <span class="input-group-text">원</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">당사계약금액 <span class="text-secondary small">(자동계산)</span></label>
                        <div class="input-group">
                            <input class="form-control bg-light" type="text" id="newOurAmount" readonly>
                            <span class="input-group-text">원</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">당사계약금액(부가세제외) <span class="text-secondary small">(자동계산)</span></label>
                        <div class="input-group">
                            <input class="form-control bg-light" type="text" id="newOurAmountVatEx" readonly>
                            <span class="input-group-text">원</span>
                        </div>
                    </div>

                    <div class="col-12"><hr class="my-1"></div>
                    <div class="col-12 col-md-6">
                        <label class="form-label">결재조건</label>
                        <input class="form-control" name="paymentCondition">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">하자기간</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="defectPeriod" min="0">
                            <span class="input-group-text">개월</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">지체상금률</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="penaltyRate" step="0.01" min="0">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            ['pmEmpNo', 'executiveEmpNo', 'salesEmpNo'].forEach(function (name) {
                var el = document.querySelector('select[name="' + name + '"]');
                if (el) new TomSelect(el, { placeholder: '이름으로 검색', maxOptions: 100 });
            });
        });

        function calcNewAmounts() {
            var amt = parseFloat(document.getElementById('newContractAmount').value) || 0;
            var rate = parseFloat(document.getElementById('newOurShareRate').value) || 100;
            var vatEx = Math.round(amt / 1.1);
            var ourAmt = Math.round(amt * rate / 100);
            var ourVatEx = Math.round(ourAmt / 1.1);
            document.getElementById('newContractAmountVatEx').value = vatEx > 0 ? vatEx.toLocaleString('ko-KR') : '';
            document.getElementById('newOurAmount').value = ourAmt > 0 ? ourAmt.toLocaleString('ko-KR') : '';
            document.getElementById('newOurAmountVatEx').value = ourVatEx > 0 ? ourVatEx.toLocaleString('ko-KR') : '';
        }
    </script>
</section>
</html>
