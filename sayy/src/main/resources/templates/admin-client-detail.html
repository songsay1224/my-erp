<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-shell :: layout('거래처 상세', 'clients', ~{::section})}">
<section>

    <!-- 헤더 -->
    <div class="app-profile-header">
        <div class="app-profile-header-info">
            <div class="app-profile-name" th:text="${client.name}">-</div>
        </div>
    </div>

    <div class="alert alert-success py-2" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

    <!-- 탭 네비게이션 + 버튼 -->
    <div class="d-flex justify-content-between align-items-center">
        <ul class="nav app-profile-tabs mt-3 mb-0 flex-grow-1">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${tab == null or tab == 'basic' ? ' active' : ''}"
               th:href="@{/admin/clients/{id}(id=${client.id},tab='basic')}">기본정보</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${tab == 'contacts' ? ' active' : ''}"
               th:href="@{/admin/clients/{id}(id=${client.id},tab='contacts')}">담당자 정보</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${tab == 'bank' ? ' active' : ''}"
               th:href="@{/admin/clients/{id}(id=${client.id},tab='bank')}">계좌정보</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${tab == 'etc' ? ' active' : ''}"
               th:href="@{/admin/clients/{id}(id=${client.id},tab='etc')}">기타정보</a>
        </li>
    </ul>
        <!-- 우측 버튼 -->
        <div class="d-flex gap-2 align-items-center ms-3 mt-3">
            <a class="btn btn-sm btn-outline-secondary" href="/admin/clients">목록</a>
            <a class="btn btn-sm btn-outline-dark" th:href="@{|/admin/clients/${client.id}/edit|}">
                <i class="bi bi-pencil"></i> 수정
            </a>
            <form th:action="@{|/admin/clients/${client.id}/delete|}" method="post" style="display:inline"
                  onsubmit="return confirm('거래처를 삭제하시겠습니까?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
            </form>
        </div>
    </div>

    <!-- ===== 기본정보 탭 ===== -->
    <div th:if="${tab == null or tab == 'basic'}" class="app-profile-section">
        <div class="app-profile-card">
            <div class="app-profile-card-head">
                <div class="fw-bold">사업자 기본정보</div>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{|/admin/clients/${client.id}/edit|}">
                    <i class="bi bi-pencil"></i>
                </a>
            </div>
            <div class="app-profile-card-body">
                <div class="row g-0 app-kv">
                    <div class="col-12 col-md-6">
                        <div class="app-kv-row">
                            <div class="app-kv-key">등록번호</div>
                            <div class="app-kv-val" th:text="${client.businessRegNoFormatted != null ? client.businessRegNoFormatted : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">대표자</div>
                            <div class="app-kv-val" th:text="${client.ceoName != null ? client.ceoName : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">개업연월일</div>
                            <div class="app-kv-val" th:text="${client.openedDate != null ? #temporals.format(client.openedDate, 'yyyy-MM-dd') : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">지역</div>
                            <div class="app-kv-val" th:text="${client.region != null ? client.region : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">주소</div>
                            <div class="app-kv-val">
                                <span th:if="${client.address != null}"
                                      th:text="${(client.zipCode != null ? '[' + client.zipCode + '] ' : '') + client.address}">-</span>
                                <span th:if="${client.address == null}" class="text-secondary">-</span>
                            </div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">업태</div>
                            <div class="app-kv-val" th:text="${client.businessType != null ? client.businessType : '-'}">-</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="app-kv-row">
                            <div class="app-kv-key">법인명(단체명)</div>
                            <div class="app-kv-val fw-semibold" th:text="${client.name}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">법인등록번호</div>
                            <div class="app-kv-val" th:text="${client.corporateRegNoFormatted != null ? client.corporateRegNoFormatted : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">업종</div>
                            <div class="app-kv-val" th:text="${client.industry != null ? client.industry : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">&nbsp;</div>
                            <div class="app-kv-val">&nbsp;</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">상세주소</div>
                            <div class="app-kv-val" th:text="${client.addressDetail != null ? client.addressDetail : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">종목</div>
                            <div class="app-kv-val" th:text="${client.businessItem != null ? client.businessItem : '-'}">-</div>
                        </div>
                    </div>
                </div>
                <div class="app-kv-row" th:if="${client.memo != null and !client.memo.isBlank()}">
                    <div class="app-kv-key">비고</div>
                    <div class="app-kv-val text-secondary" th:text="${client.memo}">-</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 담당자 정보 탭 ===== -->
    <div th:if="${tab == 'contacts'}" class="app-profile-section">
        <div class="app-profile-card">
            <div class="app-profile-card-head">
                <div class="fw-bold">담당자 정보</div>
                <button class="btn btn-sm btn-outline-dark" type="button"
                        data-bs-toggle="collapse" data-bs-target="#contactAddForm">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>
            <div class="app-profile-card-body">
                <!-- 담당자 추가 폼 -->
                <div class="collapse mb-3" id="contactAddForm">
                    <form th:action="@{|/admin/clients/${client.id}/contacts|}" method="post"
                          class="border rounded p-3 bg-light">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="row g-2">
                            <div class="col-12 col-sm-4">
                                <label class="form-label form-label-sm">담당자명 *</label>
                                <input class="form-control form-control-sm" name="name" required>
                            </div>
                            <div class="col-12 col-sm-4">
                                <label class="form-label form-label-sm">부서명</label>
                                <input class="form-control form-control-sm" name="department">
                            </div>
                            <div class="col-12 col-sm-4">
                                <label class="form-label form-label-sm">지위</label>
                                <input class="form-control form-control-sm" name="position">
                            </div>
                            <div class="col-12 col-sm-4">
                                <label class="form-label form-label-sm">연락처</label>
                                <input class="form-control form-control-sm" name="phone">
                            </div>
                            <div class="col-12 col-sm-4">
                                <label class="form-label form-label-sm">이메일</label>
                                <input class="form-control form-control-sm" type="email" name="email">
                            </div>
                            <div class="col-12 col-sm-4 d-flex align-items-end">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="isPrimary" value="true" id="isPrimary">
                                    <label class="form-check-label small" for="isPrimary">주 담당자</label>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-sm btn-dark">추가</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                    data-bs-toggle="collapse" data-bs-target="#contactAddForm">취소</button>
                        </div>
                    </form>
                </div>

                <!-- 담당자 테이블 -->
                <div class="table-responsive">
                    <table class="table table-bordered table-hover small mb-0">
                        <thead class="table-light text-center">
                            <tr>
                                <th>담당자명</th>
                                <th>부서명</th>
                                <th>지위</th>
                                <th>연락처</th>
                                <th>이메일</th>
                                <th style="width:60px"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(client.contacts)}">
                                <td colspan="6" class="text-center text-secondary py-3">등록된 담당자가 없습니다.</td>
                            </tr>
                            <tr th:each="contact : ${client.contacts}">
                                <td class="align-middle">
                                    <span th:text="${contact.name}">-</span>
                                    <span th:if="${contact.isPrimary}" class="badge text-bg-primary ms-1 small">주담당</span>
                                </td>
                                <td class="align-middle text-secondary" th:text="${contact.department != null ? contact.department : '-'}">-</td>
                                <td class="align-middle text-secondary" th:text="${contact.position != null ? contact.position : '-'}">-</td>
                                <td class="align-middle text-secondary" th:text="${contact.phone != null ? contact.phone : '-'}">-</td>
                                <td class="align-middle text-secondary" th:text="${contact.email != null ? contact.email : '-'}">-</td>
                                <td class="align-middle text-center">
                                    <form th:action="@{|/admin/clients/${client.id}/contacts/${contact.id}/delete|}"
                                          method="post" onsubmit="return confirm('담당자를 삭제하시겠습니까?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger py-0 px-1">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 계좌정보 탭 ===== -->
    <div th:if="${tab == 'bank'}" class="app-profile-section">
        <div class="app-profile-card">
            <div class="app-profile-card-head">
                <div class="fw-bold">계좌정보</div>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{|/admin/clients/${client.id}/edit|}">
                    <i class="bi bi-pencil"></i>
                </a>
            </div>
            <div class="app-profile-card-body">
                <div class="row g-0 app-kv">
                    <div class="col-12 col-md-6">
                        <div class="app-kv-row">
                            <div class="app-kv-key">계좌번호</div>
                            <div class="app-kv-val" th:text="${client.bankAccount != null ? client.bankAccount : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">은행</div>
                            <div class="app-kv-val" th:text="${client.bankName != null ? client.bankName : '-'}">-</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="app-kv-row">
                            <div class="app-kv-key">예금자명</div>
                            <div class="app-kv-val" th:text="${client.bankHolder != null ? client.bankHolder : '-'}">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 기타정보 탭 ===== -->
    <div th:if="${tab == 'etc'}" class="app-profile-section">
        <div class="app-profile-card">
            <div class="app-profile-card-head">
                <div class="fw-bold">기타정보</div>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{|/admin/clients/${client.id}/edit|}">
                    <i class="bi bi-pencil"></i>
                </a>
            </div>
            <div class="app-profile-card-body">
                <div class="row g-0 app-kv">
                    <div class="col-12 col-md-6">
                        <div class="app-kv-row">
                            <div class="app-kv-key">대표번호</div>
                            <div class="app-kv-val" th:text="${client.phone != null ? client.phone : '-'}">-</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="app-kv-row">
                            <div class="app-kv-key">홈페이지</div>
                            <div class="app-kv-val">
                                <a th:if="${client.homepage != null}" th:href="${client.homepage}" target="_blank"
                                   th:text="${client.homepage}" class="text-decoration-none text-dark">-</a>
                                <span th:if="${client.homepage == null}" class="text-secondary">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
</html>
