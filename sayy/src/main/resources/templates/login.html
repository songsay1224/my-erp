<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>

<div class="app-login">
    <div class="app-login-hero">
        <div>
            <div class="d-flex align-items-center gap-2 mb-3">
                <div class="app-brand-badge">S</div>
                <div>
                    <div class="fw-bold">SAYY Groupware</div>
                    <div class="text-secondary small">Admin & HR provisioning</div>
                </div>
            </div>
            <h1 class="mb-2">업무를 더 간단하게</h1>
            <p class="mb-0">
                관리자가 인사정보를 등록하고 계정/초기 비밀번호를 발급하는 흐름부터 시작합니다.
                이후 결재/근무/휴가로 확장할 수 있어요.
            </p>
        </div>
    </div>

    <div class="app-login-panel">
        <div class="app-login-card">
            <div class="card-body">
                <div class="app-login-brand">
                    <div class="badge">S</div>
                    <div>
                        <div class="fw-bold">로그인</div>
                        <div class="text-secondary small">관리자 계정으로 접속하세요.</div>
                    </div>
                </div>

                    <div class="alert alert-danger py-2" th:if="${param.error}">
                        아이디 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    <div class="alert alert-success py-2" th:if="${param.logout}">
                        로그아웃 되었습니다.
                    </div>

                <form th:action="@{/login}" method="post" class="mt-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label">아이디</label>
                        <input class="form-control" type="text" name="username" placeholder="예) admin" autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">비밀번호</label>
                            <input class="form-control" type="password" name="password" placeholder="비밀번호">
                        </div>
                        <button class="btn btn-dark w-100" type="submit">로그인</button>
                    </form>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <a class="btn btn-link px-0" href="/login">처음으로</a>
                    <span class="text-secondary small">
                        초기 관리자: <span class="fw-semibold">app.admin.*</span>
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
