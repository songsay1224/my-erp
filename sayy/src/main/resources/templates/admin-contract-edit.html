<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-shell :: layout('계약서 수정', 'contract-list', ~{::section})}">
<section>

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="text-secondary small">
            계약서 관리 /
            <span th:text="${project.contractName != null ? project.contractName : project.name}">-</span>
            / 수정
        </div>
        <div class="d-flex gap-2">
            <a class="btn btn-sm btn-outline-secondary"
               th:href="@{|/admin/contract-list/${project.id}|}">취소</a>
            <button class="btn btn-sm btn-dark" type="submit" form="contractEditForm">저장</button>
        </div>
    </div>

    <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

    <form id="contractEditForm"
          th:action="@{|/admin/contract-list/${project.id}|}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- 기본정보 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">기본정보</div>
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label class="form-label">관리년도</label>
                        <input class="form-control" type="number" name="managementYear"
                               th:value="${project.managementYear}" placeholder="2025">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">계약체결일</label>
                        <input class="form-control" type="date" name="contractDate"
                               th:value="${project.contractDate}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">프로젝트 코드 (계약번호)</label>
                        <input class="form-control" name="projectCode"
                               th:value="${project.projectCode}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">PM</label>
                        <select class="form-select" name="pmEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name}"
                                    th:selected="${project.pmEmpNo != null and project.pmEmpNo == emp.empNo}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">담당 임원</label>
                        <select class="form-select" name="executiveEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name}"
                                    th:selected="${project.executiveEmpNo != null and project.executiveEmpNo == emp.empNo}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">영업 담당</label>
                        <select class="form-select" name="salesEmpNo">
                            <option value="">선택 안 함</option>
                            <option th:each="emp : ${allEmployees}"
                                    th:value="${emp.empNo}"
                                    th:text="${emp.name}"
                                    th:selected="${project.salesEmpNo != null and project.salesEmpNo == emp.empNo}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">사업장</label>
                        <input class="form-control" name="businessPlace"
                               th:value="${project.businessPlace}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">수행 부서</label>
                        <select class="form-select" name="orgUnitId">
                            <option value="">선택 안 함</option>
                            <option th:each="ou : ${orgUnits}"
                                    th:value="${ou.id}"
                                    th:text="${ou.name}"
                                    th:selected="${project.orgUnitId != null and project.orgUnitId == ou.id}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">참여형태</label>
                        <input class="form-control" name="participationType"
                               th:value="${project.participationType}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">메모</label>
                        <textarea class="form-control" name="memo" rows="2"
                                  th:text="${project.memo}"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- 거래서 정보 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">거래서 정보</div>
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label class="form-label">발주처 (거래처)</label>
                        <select class="form-select" name="clientId">
                            <option value="">선택 안 함</option>
                            <option th:each="c : ${clients}"
                                    th:value="${c.id}"
                                    th:text="${c.name}"
                                    th:selected="${project.clientId != null and project.clientId == c.id}">-</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">주사업자</label>
                        <input class="form-control" name="customerOrdering"
                               th:value="${project.customerOrdering}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">수요기관</label>
                        <input class="form-control" name="customerAgency"
                               th:value="${project.customerAgency}">
                    </div>
                </div>
            </div>
        </div>

        <!-- 계약서 정보 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">계약서 정보</div>
                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label class="form-label">계약명 *</label>
                        <input class="form-control" name="contractName" required
                               th:value="${project.contractName}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">계약시작일</label>
                        <input class="form-control" type="date" name="contractStart"
                               th:value="${project.contractStart}">
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label">계약종료일</label>
                        <input class="form-control" type="date" name="contractEnd"
                               th:value="${project.contractEnd}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">결재조건</label>
                        <input class="form-control" name="paymentCondition"
                               th:value="${project.paymentCondition}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">상태</label>
                        <select class="form-select" name="status">
                            <option value="ESTIMATE" th:selected="${project.status == 'ESTIMATE'}">견적</option>
                            <option value="CONTRACT" th:selected="${project.status == 'CONTRACT'}">계약</option>
                            <option value="IN_PROGRESS" th:selected="${project.status == 'IN_PROGRESS'}">진행중</option>
                            <option value="DONE" th:selected="${project.status == 'DONE'}">완료</option>
                            <option value="CANCELLED" th:selected="${project.status == 'CANCELLED'}">취소</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- 금액 정보 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">금액 정보</div>
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label class="form-label">계약금액 (사업금액)</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="contractAmount"
                                   th:value="${project.contractAmount}" min="0" step="10000">
                            <span class="input-group-text">원</span>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">수급형태</label>
                        <input class="form-control" name="supplyType"
                               th:value="${project.supplyType}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">지분율 (%)</label>
                        <div class="input-group">
                            <input class="form-control" type="number" name="ourShareRate"
                                   th:value="${project.ourShareRate}" min="0" max="100">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 사업단유분 -->
        <div class="app-setting-card mb-3">
            <div class="card-body">
                <div class="fw-bold mb-3">사업단유분</div>
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label class="form-label">L1 (대분류)</label>
                        <input class="form-control" name="categoryMajor"
                               th:value="${project.categoryMajor}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">L2 (중분류)</label>
                        <input class="form-control" name="categoryMinor"
                               th:value="${project.categoryMinor}">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label">L3 (소분류)</label>
                        <input class="form-control" name="categoryL3"
                               th:value="${project.categoryL3}">
                    </div>
                </div>
            </div>
        </div>

    </form>

    <!-- 하단 저장/취소 -->
    <div class="d-flex justify-content-end gap-2 mt-2 mb-4">
        <a class="btn btn-outline-secondary"
           th:href="@{|/admin/contract-list/${project.id}|}">취소</a>
        <button class="btn btn-dark" type="submit" form="contractEditForm">저장</button>
    </div>

</section>
</html>
