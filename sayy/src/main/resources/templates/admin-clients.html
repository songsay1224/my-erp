<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-shell :: layout('거래처 관리', 'clients', ~{::section})}">
<section>

    <div class="alert alert-success py-2 mb-2" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger py-2 mb-2" th:if="${error}" th:text="${error}"></div>

    <!-- 상단 버튼 / 검색 영역 -->
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
        <!-- 좌측 버튼 그룹 -->
        <div class="d-flex gap-1 flex-wrap align-items-center">
            <a class="btn btn-sm btn-dark" href="/admin/clients/new">
                <i class="bi bi-plus-lg"></i> 등록
            </a>
            <form id="deleteForm" method="post" action="/admin/clients/delete-selected" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="button" class="btn btn-sm btn-outline-danger" onclick="submitDelete()">
                    <i class="bi bi-trash"></i> 삭제
                </button>
            </form>
            <a class="btn btn-sm btn-outline-secondary" href="/admin/clients/import">
                <i class="bi bi-upload"></i> 일괄 등록
            </a>
            <a class="btn btn-sm btn-outline-secondary" href="/admin/clients/export">
                <i class="bi bi-download"></i> 목록 다운로드
            </a>
        </div>

        <!-- 우측: 검색 + 페이지당 건수 -->
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <form class="d-flex gap-1 flex-wrap align-items-center" method="get" action="/admin/clients" id="searchForm">
                <select class="form-select form-select-sm" name="clientType" style="width:100px"
                        onchange="document.getElementById('searchForm').submit()">
                    <option value="" th:selected="${selectedClientType == null or selectedClientType == ''}">구분 전체</option>
                    <option value="매출" th:selected="${selectedClientType == '매출'}">매출</option>
                    <option value="매입" th:selected="${selectedClientType == '매입'}">매입</option>
                    <option value="매출매입" th:selected="${selectedClientType == '매출매입'}">매출매입</option>
                </select>
                <select class="form-select form-select-sm" name="status" style="width:100px"
                        onchange="document.getElementById('searchForm').submit()">
                    <option value="" th:selected="${selectedStatus == null or selectedStatus == ''}">상태 전체</option>
                    <option value="ACTIVE"  th:selected="${selectedStatus == 'ACTIVE'}">거래중</option>
                    <option value="DORMANT" th:selected="${selectedStatus == 'DORMANT'}">휴면</option>
                    <option value="CLOSED"  th:selected="${selectedStatus == 'CLOSED'}">거래종료</option>
                </select>
                <div class="input-group input-group-sm" style="width:220px">
                    <input class="form-control" type="search" name="keyword"
                           th:value="${keyword}" placeholder="거래처명, 대표자, 사업자번호">
                    <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
                </div>
                <input type="hidden" name="page" value="1"/>
                <input type="hidden" name="pageSize" th:value="${pageSize != null ? pageSize : 20}"/>
            </form>

            <!-- 페이지당 건수 -->
            <form method="get" action="/admin/clients" class="d-flex align-items-center gap-1">
                <input type="hidden" name="status" th:value="${selectedStatus}"/>
                <input type="hidden" name="clientType" th:value="${selectedClientType}"/>
                <input type="hidden" name="keyword" th:value="${keyword}"/>
                <input type="hidden" name="page" value="1"/>
                <select class="form-select form-select-sm" name="pageSize" style="width:80px"
                        onchange="this.form.submit()">
                    <option value="10"  th:selected="${pageSize == 10}">10</option>
                    <option value="20"  th:selected="${pageSize == 20}">20</option>
                    <option value="50"  th:selected="${pageSize == 50}">50</option>
                    <option value="100" th:selected="${pageSize == 100}">100</option>
                </select>
            </form>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="app-setting-card p-0">
        <div th:if="${#lists.isEmpty(clients)}" class="text-secondary small p-4 text-center">
            등록된 거래처가 없습니다.
        </div>
        <div class="table-responsive" th:if="${!#lists.isEmpty(clients)}">
            <table class="table table-hover table-bordered mb-0 small">
                <thead class="table-light text-center">
                    <tr>
                        <th style="width:36px">
                            <input type="checkbox" id="checkAll" onclick="toggleAll(this)"/>
                        </th>
                        <th style="width:44px">No.</th>
                        <th style="width:64px">구분</th>
                        <th style="width:120px">등록번호</th>
                        <th>법인명(단체명)</th>
                        <th style="width:80px">대표자</th>
                        <th style="width:140px">법인등록번호</th>
                        <th style="width:60px" class="d-none d-lg-table-cell">지역</th>
                        <th class="d-none d-xl-table-cell">주소</th>
                        <th class="d-none d-xl-table-cell">상세주소</th>
                        <th style="width:120px" class="d-none d-lg-table-cell">대표번호</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c, stat : ${clients}">
                        <td class="text-center align-middle">
                            <input type="checkbox" class="row-check" th:value="${c.id}"/>
                        </td>
                        <td class="text-center align-middle text-secondary"
                            th:text="${(page - 1) * pageSize + stat.count}">1</td>
                        <td class="text-center align-middle">
                            <span th:text="${c.clientType != null ? c.clientType : '매출'}">매출</span>
                        </td>
                        <td class="align-middle text-secondary small"
                            th:text="${c.businessRegNoFormatted != null ? c.businessRegNoFormatted : ''}">-</td>
                        <td class="align-middle">
                            <a th:href="@{/admin/clients/{id}(id=${c.id})}"
                               class="text-dark text-decoration-none fw-semibold"
                               th:text="${c.name}">-</a>
                        </td>
                        <td class="align-middle text-secondary"
                            th:text="${c.ceoName != null ? c.ceoName : ''}">-</td>
                        <td class="align-middle text-secondary small"
                            th:text="${c.corporateRegNoFormatted != null ? c.corporateRegNoFormatted : ''}">-</td>
                        <td class="align-middle text-secondary d-none d-lg-table-cell"
                            th:text="${c.region != null ? c.region : ''}">-</td>
                        <td class="align-middle text-secondary d-none d-xl-table-cell"
                            th:text="${c.address != null ? c.address : ''}">-</td>
                        <td class="align-middle text-secondary d-none d-xl-table-cell"
                            th:text="${c.addressDetail != null ? c.addressDetail : ''}">-</td>
                        <td class="align-middle text-secondary d-none d-lg-table-cell"
                            th:text="${c.phone != null ? c.phone : ''}">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <div class="d-flex justify-content-between align-items-center mt-2 flex-wrap gap-2"
         th:if="${totalPages > 0}">
        <div class="text-secondary small">
            전체 <span th:text="${total}">0</span>건
        </div>
        <nav th:if="${totalPages > 1}">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${page <= 1 ? ' disabled' : ''}">
                    <a class="page-link"
                       th:href="@{/admin/clients(status=${selectedStatus},clientType=${selectedClientType},keyword=${keyword},page=${page-1},pageSize=${pageSize})}">
                        &laquo;
                    </a>
                </li>
                <li class="page-item"
                    th:each="p : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${p == page ? ' active' : ''}">
                    <a class="page-link"
                       th:href="@{/admin/clients(status=${selectedStatus},clientType=${selectedClientType},keyword=${keyword},page=${p},pageSize=${pageSize})}"
                       th:text="${p}">1</a>
                </li>
                <li class="page-item" th:classappend="${page >= totalPages ? ' disabled' : ''}">
                    <a class="page-link"
                       th:href="@{/admin/clients(status=${selectedStatus},clientType=${selectedClientType},keyword=${keyword},page=${page+1},pageSize=${pageSize})}">
                        &raquo;
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <script>
        function toggleAll(cb) {
            document.querySelectorAll('.row-check').forEach(c => c.checked = cb.checked);
        }
        function submitDelete() {
            const checked = Array.from(document.querySelectorAll('.row-check:checked')).map(c => c.value);
            if (checked.length === 0) { alert('삭제할 거래처를 선택하세요.'); return; }
            if (!confirm(checked.length + '개 거래처를 삭제하시겠습니까?')) return;
            const form = document.getElementById('deleteForm');
            document.querySelectorAll('.del-id-input').forEach(e => e.remove());
            checked.forEach(id => {
                const inp = document.createElement('input');
                inp.type = 'hidden'; inp.name = 'ids'; inp.value = id;
                inp.className = 'del-id-input';
                form.appendChild(inp);
            });
            form.submit();
        }
    </script>

</section>
</html>
