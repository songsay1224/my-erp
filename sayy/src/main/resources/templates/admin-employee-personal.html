<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin-shell :: layout('구성원', 'members', ~{::section})}">
<section>
    <div th:replace="~{fragments/employee-menu :: menu('list')}"></div>

    <div class="text-secondary small mb-3">
        구성원 / <span class="fw-semibold" th:text="${employee.name}">이름</span>
    </div>

    <div class="app-profile-head">
        <div class="app-profile-avatar" aria-hidden="true">
            <span th:text="${employee.name != null and !employee.name.isBlank() ? employee.name.substring(0, 1) : 'P'}">P</span>
        </div>
        <div class="app-profile-main">
            <div class="d-flex flex-wrap align-items-end justify-content-between gap-3">
                <div>
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <div class="app-profile-name" th:text="${employee.name}">이름</div>
                        <span class="badge"
                              th:classappend="${
                                  employee.employmentStatus == T(com.example.sayy.Entity.EmploymentStatus).ACTIVE ? ' app-badge-active' :
                                  (employee.employmentStatus == T(com.example.sayy.Entity.EmploymentStatus).LEAVE ? ' app-badge-leave' : ' app-badge-terminated')
                              }"
                              th:text="${employee.employmentStatus != null ? employee.employmentStatus.label : '재직'}">재직</span>
                    </div>
                    <div class="app-profile-meta">
                        <div>
                            조직
                            <span class="text-secondary ms-2"
                                  th:text="${employee.departmentName != null ? employee.departmentName : '-'}">-</span>
                        </div>
                        <div class="ms-3">
                            직무
                            <span class="text-secondary ms-2" th:text="${employee.jobNames != null ? employee.jobNames : '-'}">-</span>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <div class="vr"></div>
                    <a class="btn btn-sm btn-outline-dark" th:href="@{|/admin/employees/${employee.empNo}/personal/edit|}">
                        <i class="bi bi-pencil"></i> 개인정보 수정
                    </a>
                </div>
            </div>

            <ul class="nav app-profile-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{|/admin/employees/${employee.empNo}|}">인사 정보</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{|/admin/employees/${employee.empNo}/personal|}">개인 정보</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{|/admin/employees/${employee.empNo}/contract|}">계약정보</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{|/admin/employees/${employee.empNo}/career|}">경력·학력</a>
                </li>
                <!--<li class="nav-item">
                    <a class="nav-link disabled" href="#" tabindex="-1" aria-disabled="true">인사노트</a>-->
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{|/admin/employees/${employee.empNo}/documents|}">문서</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="alert alert-success py-2" th:if="${success}" th:text="${success}"></div>
    <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

    <div class="app-profile-section">
        <div class="app-profile-card">
            <div class="app-profile-card-head">
                <div class="fw-bold">개인 정보</div>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{|/admin/employees/${employee.empNo}/personal/edit|}">
                    <i class="bi bi-pencil"></i>
                </a>
            </div>
            <div class="app-profile-card-body">
                <div class="row g-0 app-kv">
                    <div class="col-12 col-md-6">
                        <div class="app-kv-row">
                            <div class="app-kv-key">이름</div>
                            <div class="app-kv-val" th:text="${employee.name}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">영문 이름</div>
                            <div class="app-kv-val" th:text="${employee.nameEn != null ? employee.nameEn : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">생년월일</div>
                            <div class="app-kv-val">
                                <span th:text="${employee.birthDate != null ? employee.birthDate : '-'}">-</span>
                                <span class="text-secondary ms-2" th:if="${employee.ageCalculated != null}" th:text="${employee.ageCalculated + '세'}">0세</span>
                            </div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">성별</div>
                            <div class="app-kv-val">
                                <span th:text="${employee.genderResolved != null ? employee.genderResolved : '-'}">-</span>
                                <span class="text-secondary small ms-1"
                                      th:if="${employee.gender == null and employee.genderResolved != null}">(주민등록번호 기준)</span>
                            </div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">주민등록번호</div>
                            <div class="app-kv-val" th:text="${employee.identificationNumberFormatted != null ? employee.identificationNumberFormatted : '-'}">-</div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="app-kv-row">
                            <div class="app-kv-key">국적</div>
                            <div class="app-kv-val" th:text="${employee.nationality != null ? employee.nationality : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">휴대전화</div>
                            <div class="app-kv-val" th:text="${employee.phone != null ? employee.phone : '-'}">-</div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">급여 계좌</div>
                            <div class="app-kv-val">
                                <span th:if="${employee.bankName != null}" th:text="${employee.bankName + ' '}"></span>
                                <span th:if="${employee.bankAccount != null}" th:text="${employee.bankAccount}"></span>
                                <span th:if="${employee.bankName == null and employee.bankAccount == null}" class="text-secondary">-</span>
                            </div>
                        </div>
                        <div class="app-kv-row">
                            <div class="app-kv-key">예금주</div>
                            <div class="app-kv-val" th:text="${employee.bankHolder != null ? employee.bankHolder : '-'}">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
